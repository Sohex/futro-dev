projects:
  - name: musefs
    url: https://github.com/Sohex/musefs
    bullets:
      - >-
        Designed and built a read-only FUSE filesystem in Rust (multi-crate
        workspace) that presents a re-tagged, reorganized music library without
        modifying or duplicating a single byte of the original audio.
      - >-
        Drove correctness with a deep automated-testing stack: property and
        fuzz testing of all five format parsers, mutation testing to prove the
        suite actually kills bugs, and a purpose-built second FUSE filesystem
        (latencyfs) that injects controlled backing-store latency to exercise
        the serve path under slow disks and NFS.
      - >-
        Engineered the release pipeline for portable distribution: static
        cross-compiled musl and glibc binaries across x86_64 and aarch64 with a
        glibc 2.17 floor, plus a serve path hardened with a blocking-read worker
        pool and optional kernel FUSE passthrough.
  - name: futro.dev
    url: https://github.com/Sohex/futro-dev
    bullets:
      - >-
        Self-hosted static site shipped as an immutable FROM scratch container
        image, deployed by registry pull with image-tag rollbacks.
      - >-
        Enforce a hard per-page budget in CI (under 14.5 KB brotli, home under
        10 KB) so every page fits within the initial TCP congestion window, with
        per-page font subsetting, hash-based CSP, and link and HTML validation
        as gates.
      - >-
        Full server-side observability with zero client-side tracking: Caddy
        logs to Vector to VictoriaMetrics, a Perses dashboard, and vmalert and
        ntfy alerting.
