<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if not .IsHome }}{{ .Title }} · {{ end }}{{ site.Title }}</title>
  <meta name="description" content="{{ .Description | default site.Params.description }}">
  <link rel="icon" href="data:image/svg+xml;base64,{{ os.ReadFile "static/favicon.svg" | base64Encode }}" type="image/svg+xml">
  <link rel="preload" href="/fonts/iosevka-etoile-latin.woff2" as="font" type="font/woff2" crossorigin>
  <script>
    (function () {
      var t = localStorage.getItem("theme");
      if (t === "light" || t === "dark") document.documentElement.dataset.theme = t;
    })();
  </script>
  {{ $css := resources.Get "scss/main.scss" | css.Sass (dict "targetPath" "css/main.css") | minify }}
  <style>{{ $css.Content | safeCSS }}</style>
  {{ with site.GetPage "/posts" }}{{ with .OutputFormats.Get "rss" -}}
  <link rel="alternate" type="application/rss+xml" title="{{ site.Title }} — posts" href="{{ .Permalink }}">
  {{- end }}{{ end }}
</head>
