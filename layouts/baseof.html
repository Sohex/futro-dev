<!doctype html>
<html lang="en">
{{- $_ := .WordCount -}}{{/* render content now so code-block hooks set hasCode before <head> */}}
{{ partial "head.html" . }}
<body>
  {{ partial "header.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  {{ $js := resources.Get "js/theme.js" | minify }}
  <script>{{ $js.Content | safeJS }}</script>
</body>
</html>
